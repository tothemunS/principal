function buildCalendar(){

 const box = document.getElementById('calendarBox');
 const now = new Date();
 const y = now.getFullYear();
 const m = now.getMonth();
let first = new Date(y,m,1).getDay();
first = (first === 0) ? 6 : first - 1;
 const days = new Date(y,m+1,0).getDate();

 // Calcular próximo martes
 let nextTuesday = new Date(now);
 while(nextTuesday.getDay() !== 2){
   nextTuesday.setDate(nextTuesday.getDate() + 1);
 }

 let html = `<table class="miniCalendar"><tr>`;
const wd=['L','M','M','J','V','S','D'];
wd.forEach(d=>html+=`<th>${d}</th>`);
 html+='</tr><tr>';

 for(let i=0;i<first;i++) html+='<td></td>';

 for(let d=1; d<=days; d++){

   const fecha = new Date(y,m,d);
   let clase = "";

   const esHoy = d === now.getDate();
   const esMartes = fecha.getDay() === 2;

   if(esHoy){
     clase = "today";
   }

   if(esMartes){
     if(
       fecha.getDate() === nextTuesday.getDate() &&
       fecha.getMonth() === nextTuesday.getMonth()
     ){
       clase = "nextTuesday";
     }else if(fecha < nextTuesday){
       clase = "pastTuesday";
     }
   }

   html += `<td class='${clase}'>${d}</td>`;

if((first + d) % 7 === 0) html+='</tr><tr>';
 }

 html+='</tr></table>';
 box.innerHTML = html;
}

async function cargarCSV(url){
  const res = await fetch(url);
  const text = await res.text();

  const lines = text.trim().split("\n");
  const headers = lines[0]
    .split(",")
    .map(h => h.trim().toLowerCase());

  return lines.slice(1).map(line => {
    const values = line.split(",").map(v => v.trim());

    const row = {};
    headers.forEach((h, i) => row[h] = values[i] || "");

    // 💰 limpiar y convertir precio correctamente
    let precioLimpio = row.precio
      ?.replace(",", ".")
      ?.replace(/[^0-9.]/g, "");

    let precio = parseFloat(precioLimpio);
    if(isNaN(precio)) precio = 0;

    return {
      marca: row.marca,
      codigo: row.codigo,
      nombre: row.nombre,
      precio: precio,
      categoria: row.categoria
    };
  }).filter(p => p.nombre && p.precio > 0);
}
